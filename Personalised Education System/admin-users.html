<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Admin — Manage User Profiles for the Personalized Education Recommendation System.">
    <title>Admin — Users Profile Data</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
</head>

<body>

    <div class="dashboard">
        <!-- Admin Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <h2>Admin</h2>
            </div>
            <nav class="admin-sidebar-nav">
                <a href="admin-users.html" class="active">Manage User Profile</a>
                <a href="admin-feedback.html">View Feedback</a>
                <a href="logout.html" class="logout-link">Logout</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <h1 class="admin-page-title">Users Profile Data</h1>
            <div class="data-table-wrapper">
                <table class="data-table" id="usersTable">
                    <thead>
                        <tr>
                            <th>First Name</th>
                            <th>Middle Name</th>
                            <th>Last Name</th>
                            <th>Email</th>
                            <th>Phone Number</th>
                            <th>Gender</th>
                            <th>Education</th>
                            <th>Intrest/Goals</th>
                            <th>Skills</th>
                            <th>Delete</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="database.js"></script>
    <script>
        // Check admin auth
        if (!DB.isAdminLoggedIn()) {
            window.location.href = 'admin-login.html';
        }

        async function loadUsers() {
            var profiles = await DB.getAllProfiles();
            var tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';

            if (profiles.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; padding:24px; color:#6b7280;">No user profiles found.</td></tr>';
                return;
            }

            profiles.forEach(function (p) {
                var tr = document.createElement('tr');
                tr.innerHTML =
                    '<td>' + (p.firstName || '') + '</td>' +
                    '<td>' + (p.middleName || '') + '</td>' +
                    '<td>' + (p.lastName || '') + '</td>' +
                    '<td>' + (p.email || '') + '</td>' +
                    '<td>' + (p.phone || '') + '</td>' +
                    '<td>' + (p.gender || '') + '</td>' +
                    '<td>' + (p.education || '') + '</td>' +
                    '<td>' + (p.interest || '') + '</td>' +
                    '<td>' + (p.skills || '') + '</td>' +
                    '<td><button class="delete-btn" onclick="deleteProfile(' + p.userId + ')">Delete</button></td>';
                tbody.appendChild(tr);
            });
        }

        async function deleteProfile(userId) {
            if (confirm('Are you sure you want to delete this profile?')) {
                await DB.deleteProfile(userId);
                loadUsers();
            }
        }

        loadUsers();
    </script>
</body>

</html>
